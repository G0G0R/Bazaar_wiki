<h1 class="text-3xl font-bold text-center mt-4 mb-6">
  Bazaar Wiki
</h1>

<!-- SEARCH -->
<div class="flex justify-center mb-6">
  <input
    type="text"
    placeholder="Rechercher..."
    [(ngModel)]="searchTerm"
    (ngModelChange)="updateFilter()"
    class="w-80 px-3 py-2 rounded border border-gray-300 focus:outline-none focus:ring-2 focus:ring-blue-500"
  />
</div>

<!-- GRID -->
<div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-6 gap-6 px-6">

  @for (item of displayedItems; track item.id) {
    <app-item-card [item]="item"></app-item-card>
  }

</div>
